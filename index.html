<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Leo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      text-align: center;
    }

    header {
      background: #1e293b;
      padding: 30px 20px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    p {
      color: #94a3b8;
    }

    .container {
      padding: 40px 20px;
    }

    .profile-img {
      width: 200px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .section {
      margin-top: 50px;
    }

    .gallery {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .gallery img {
      width: 200px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      background: #1e293b;
      font-size: 14px;
      color: #64748b;
    }
  </style>
</head>

<body>

<header>
  <h1>Portfolio Saya</h1>
  <p>Simple. Clean. Professional.</p>
</header>

<div class="container">

  <!-- PROFILE -->
  <div class="section">
    <h2>Tentang Saya</h2>
    <img src="Office.png" class="profile-img">
    <p>Halo, saya Leo. Saya tertarik di bidang kreatif, desain, dan pengembangan digital.</p>
  </div>

  <!-- PROJECT -->
  <div class="section">
    <h2>Project Saya</h2>
    <div class="gallery">
      <img src="Office.png">
      <img src="Office.png">
      <img src="Office.png">
    </div>
  </div>

  <!-- CONTACT -->
  <div class="section">
    <h2>Kontak</h2>
    <p>Email: emailanda@gmail.com</p>
    <p>Instagram: @usernameanda</p>
  </div>

</div>

<footer>
  © 2026 Leo Portfolio
</footer>

</body>
</html>
